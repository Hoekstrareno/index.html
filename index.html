<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechDeal Store – Beste Elektronica Deals</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #111; }
  header { background: #111; color: #fff; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  header span { font-size: 12px; color: #aaa; }
  .affiliate-bar { background: #fffbe6; border-bottom: 1px solid #f0e68c; padding: 8px 2rem; font-size: 12px; color: #555; }
  main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .card img { width: 100%; aspect-ratio: 1; object-fit: contain; padding: 16px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
  .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-category { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
  .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; color: #111; flex: 1; }
  .card-price { font-size: 18px; font-weight: 600; color: #B12704; margin-top: 4px; }
  .card-btn { display: block; text-align: center; margin-top: 10px; padding: 10px; background: #FF9900; color: #111; font-size: 13px; font-weight: 600; border-radius: 8px; text-decoration: none; transition: background 0.2s; }
  .card-btn:hover { background: #e88a00; }
  footer { text-align: center; padding: 2rem; font-size: 12px; color: #aaa; border-top: 1px solid #eee; margin-top: 2rem; }
</style>
</head>
<body>
<header>
  <h1>⚡ TechDeal Store</h1>
  <span>Powered by Amazon Associates</span>
</header>
<div class="affiliate-bar">
  * Als Amazon Associate verdien ik aan in aanmerking komende aankopen via links op deze pagina.
</div>
<main>
  <div class="grid" id="grid"></div>
</main>
<footer>
  © 2026 TechDeal Store &nbsp;·&nbsp; Als Amazon Associate verdien ik aan in aanmerking komende aankopen.
</footer>
<script>
  const PRODUCTEN = [
    {
      titel: "Endure SF2400 Pro – Zonne-energie Thuisbatterij 2400W AC, 4800W PV-ingang",
      prijs: "3.555,99",
      categorie: "Zonne-energie",
      link: "https://amzn.to/4eAM8rf",
      afbeelding: "https://m.media-amazon.com/images/I/61GhVNmLvQL._SX522_.jpg"
    },
    {
      titel: "Jackery SolarVault 3 Pro Max thuisbatterij met 2x BP2500 en 4x 500W dubbelglas zonnepanelen",
      prijs: "2.687,00",
      categorie: "Zonne-energie",
      link: "https://amzn.to/3QVlwcN",
      afbeelding: "https://m.media-amazon.com/images/I/71OE+iV0kCL._AC_SX679_.jpg"
    },
    {
      titel: "EF EcoFlow DELTA 3 Classic Draagbaar powerstation 1024Wh, 1800W AC-uitgang, snel opladen 1 uur",
      prijs: "599,00",
      categorie: "Zonne-energie",
      link: "https://amzn.to/43Pmt9x",
      afbeelding: "https://m.media-amazon.com/images/I/6188xsKjUmL._AC_SX679_.jpg"
    },
    {
      titel: "EcoFlow Portable Power Station RIVER 2 MAX, 512Wh LiFePO4, 1000W uitgang, snel opladen 1 uur",
      prijs: "349,00",
      categorie: "Zonne-energie",
      link: "https://amzn.to/4oLEJdv",
      afbeelding: "https://m.media-amazon.com/images/I/51PKOOp-eWL._AC_SX679_.jpg"
    }
  ];

  function renderGrid() {
    const grid = document.getElementById('grid');
    PRODUCTEN.forEach(p => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <img src="${p.afbeelding}" alt="${p.titel}" onerror="this.src='https://placehold.co/300x300?text=Geen+foto'">
        <div class="card-body">
          <span class="card-category">${p.categorie}</span>
          <span class="card-title">${p.titel}</span>
          <span class="card-price">€ ${p.prijs}</span>
          <a class="card-btn" href="${p.link}" target="_blank" rel="nofollow sponsored">Bekijk op Amazon ›</a>
        </div>`;
      grid.appendChild(div);
    });
  }
  renderGrid();
</script>
</body>
</html>
